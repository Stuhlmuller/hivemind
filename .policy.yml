policy:
  approval:
    - and:
      - signed
      - codex body approved

approval_rules:
  - name: signed
    requires:
      conditions:
        has_valid_signatures: true
  - name: codex body approved
    options:
      allow_author: true
      methods:
        comments: []
        github_review: false
        body_patterns:
          - '(?ms)^## Summary\n.*^## Issue\n\nCloses #[0-9]+\.?\n.*^## Verification\n'
    requires:
      count: 1
      permissions:
        - write
